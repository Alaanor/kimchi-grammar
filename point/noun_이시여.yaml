point: (이)시여
definitions:
  - slug: polite-address
    name: Polite address
    meaning: A polite form of address, often implying an exclamation or an appeal. This is a more polite version of (이)여.
    examples:
      - type: simple
        sentence: <f>전능자시여</f> 우리에게 자비를 베풀어 주옵소서.
        translated: Almighty God, have mercy on us.
        audio_url: https://r2.kimchi-reader.app/grammar/전능자시여_우리에게_자비를_베풀어_주옵소서__2026-05-15.mp3
      - type: simple
        sentence: <f>하늘이시여</f>, 우리를 지켜 주소서.
        translated: O God please watch over us.
        audio_url: https://r2.kimchi-reader.app/grammar/하늘이시여,_우리를_지켜_주소서__2026-05-15.mp3
