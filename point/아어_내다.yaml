point: 아/어 내다
definitions:
  - slug: overcoming-difficulty
    name: Completing a difficult action
    english_alternatives: Finally, after much difficulty
    meaning: Marks an action as completed through much difficulty, effort, or time.
    examples:
      - type: simple
        sentence: 김치리더 덕분에 드디어 그 어려운 책을 읽어 냈습니다!
        translated: Thanks to Kimchi Reader, I finally read that difficult book.
      - type: simple
        sentence: 경찰 아저씨가 범인을 찾아 냈다.
        translated: The policeman finally found the culprit.
metadata:
  type: composite
details: |-
  # Completed actions {#completed-actions}
  
  Both :grammar[아어_버리다]{noprefix} and :grammar[아어_내다]{noprefix} mark action as completed. However, the latter always has an underlying tone of going through some difficulty in achieving the action. That may include effort or time put in.
