name: (는)구려/(는)구료
definitions:
  - slug: 하오체-new-information
    name: 하오체 New information
    meaning: Express surprise after learning something new.
    examples:
      - type: simple
        sentence: 정말 깨끗한 <f>동네이구려</f>.
        translated: Wow, this is a really clean neighborhood.
        audio_url: https://r2.kimchi-reader.app/grammar/정말_깨끗한_동네이구려__2026-05-15.mp3
      - type: simple
        sentence: 그 소식에 참 <f>서운하셨겠구료</f>.
        translated: You must have been really disappointed to hear that.
        audio_url: https://r2.kimchi-reader.app/grammar/그_소식에_참_서운하셨겠구료__2026-05-15.mp3
      - type: simple
        sentence: 오늘은 참 잘 <f>잡수시는구려</f>.
        translated: You’re really eating well today.
        audio_url: https://r2.kimchi-reader.app/grammar/오늘은_참_잘_잡수시는구려__2026-05-15.mp3
  - slug: 하오체-polite-command
    name: 하오체 Polite command
    meaning: Expresses a command in a polite, suggestive tone.
    examples:
      - type: simple
        sentence: 더 늦으면 어두워질 테니 어서 <f>가구려</f>.
        translated: It'll get dark soon so let's get going.
        audio_url: https://r2.kimchi-reader.app/grammar/더_늦으면_어두워질_테니_어서_가구려__2026-05-15.mp3
      - type: simple
        sentence: 이 사람에게도 한 잔 <f>권하시구려</f>.
        translated: Why don't you offer this person a drink, too?
        audio_url: https://r2.kimchi-reader.app/grammar/이_사람에게도_한_잔_권하시구려__2026-05-15.mp3
metadata:
  type: verb
details: |-
  # Usage {#usage}

  :grammar[verb_는구려]{하오체-new-information} takes the form 는구려 after action verbs and 구려 after descriptive verbs, while :grammar[verb_는구려]{하오체-polite-command}
  takes the form 구려 after action verbs and is not used with descriptive verbs. (는)구려 is the correct spelling, but (는)구료 is a common non-standard usage.

  # What is 하오체? {#what-is-하오체?}

  <f>하오체</f> is honorific speech used in archaic Korean; used to respectfully address someone without lowering
  oneself, however, it is considered archaic in modern Korean and it is rare to encounter it in everyday speech.

  You will encounter <f>하오체</f> in period dramas, traditional literature or in North - Korea; where it is still in use today.

  <f>하오체</f> has been replaced by <f>해요체</f> in modern times. :source[https://en.wikipedia.org/wiki/Korean_speech_levels]
