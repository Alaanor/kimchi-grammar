name: 고프다
definitions:
  - slug: desire
    name: Desire
    english_alternatives: to want, desire
    meaning: Used to express a desire or wish to do something. A shortened form of :grammar[고_싶다].
    examples:
      - sentence: 나도 <f>춤추고파</f>!
        type: simple
        translated: I want to dance too!
        audio_url: https://r2.kimchi-reader.app/grammar/나도_춤추고파__2026-05-15.mp3
      - sentence: 예전부터 <f>보고픈</f> 사람을 드디어 봤다.
        type: simple
        translated: I finally saw the person I've wanted to see for a long time.
        audio_url: https://r2.kimchi-reader.app/grammar/예전부터_보고픈_사람을_드디어_봤다__2026-05-15.mp3
metadata:
  type: verb
details: |-
  # Usage {#usage}

  -고프다 as a contraction of -:grammar[고_싶다]{noprefix} is used in literary or poetic settings like novels, poems, or songs.
  It's mostly seen in the noun modifier form as -고픈.

  It's not to be confused with the adjective :dict[고프다] (for one's stomach to be empty).
