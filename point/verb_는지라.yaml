point: 는지라/(으)ㄴ지라
definitions:
  - slug: reason-or-cause
    name: Reason or cause
    meaning: Indicates that the first clause is the reason or cause for the second clause.
    examples:
      - type: simple
        sentence: 선생님께서 고집을 굽히지 않으시는지라 우리도 어쩔 수 없었다.
        translated: Since the teacher won't budge, there was nothing we could do.
        audio_url:
      - type: simple
        sentence: 이미 밥을 먹은지라 더 이상 먹을 수가 없다.
        translated: I already ate, so I can’t eat any more.
        audio_url:
      - type: simple
        sentence: 나는 어릴 적부터의 친구인지라 그의 마음을 잘 안다.
        translated: Since we've been friends since childhood, I know exactly how he feels.
        audio_url:
      - type: simple
        sentence: 기분이 좋은지라 다른 사람에게도 다정하게 말을 건다.
        translated: Since I'm in a good mood, I speak kindly to others as well.
        audio_url:
metadata:
  type: verb
details: |-
  # Usage {#usage}
  |Usage|Conjugation|
  |---|---|
  |Present (descriptive verb)|<f>(으)ㄴ지라</f>|
  |Present (action verb)|<f>는지라</f>|
  |Past (all)|<f>(으)ㄴ지라</f>|
