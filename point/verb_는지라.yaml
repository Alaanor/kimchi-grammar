name: 는지라/(으)ㄴ지라
definitions:
  - slug: reason-or-cause
    name: Reason or cause
    meaning: Indicates that the first clause is the reason or cause for the second clause.
    examples:
      - type: simple
        sentence: 선생님께서 고집을 굽히지 <f>않으시는지라</f> 우리도 어쩔 수 없었다.
        translated: Since the teacher won't budge, there was nothing we could do.
        audio_url: https://r2.kimchi-reader.app/grammar/선생님께서_고집을_굽히지_않으시는지라_우리도_어쩔_수_없었다__2026-05-15.mp3
      - type: simple
        sentence: 이미 밥을 <f>먹은지라</f> 더 이상 먹을 수가 없다.
        translated: I already ate, so I can’t eat any more.
        audio_url: https://r2.kimchi-reader.app/grammar/이미_밥을_먹은지라_더_이상_먹을_수가_없다__2026-05-15.mp3
      - type: simple
        sentence: 나는 어릴 적부터의 <f>친구인지라</f> 그의 마음을 잘 안다.
        translated: Since we've been friends since childhood, I know exactly how he feels.
        audio_url: https://r2.kimchi-reader.app/grammar/나는_어릴_적부터의_친구인지라_그의_마음을_잘_안다__2026-05-15.mp3
      - type: simple
        sentence: 기분이 <f>좋은지라</f> 다른 사람에게도 다정하게 말을 건다.
        translated: Since I'm in a good mood, I speak kindly to others as well.
        audio_url: https://r2.kimchi-reader.app/grammar/기분이_좋은지라_다른_사람에게도_다정하게_말을_건다__2026-05-15.mp3
metadata:
  type: verb
details: |-
  # Usage {#usage}
  |Usage|Conjugation|
  |---|---|
  |Present (descriptive verb)|<f>(으)ㄴ지라</f>|
  |Present (action verb)|<f>는지라</f>|
  |Past (all)|<f>(으)ㄴ지라</f>|
