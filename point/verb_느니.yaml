name: 느니
definitions:
  - slug: better-choice
    name: Better choice
    english_alternatives: Rather
    meaning: Indicates that although neither of the two choices mentioned in the preceding and following clauses is ideal, the one in the following clause is the better option.
    examples:
      - sentence: 비가 오는 날에 <f>걷느니</f> 차라리 집에 있을래요.
        type: simple
        translated: Rather than walking on a rainy day, I'd rather stay at home.
        audio_url: https://r2.kimchi-reader.app/grammar/비가_오는_날에_걷느니_차라리_집에_있을래요__2024-05-27.mp3
      - sentence: 혼자서 <f>공부하느니</f> 도서관에서 친구들과 같이 공부할게요.
        type: simple
        translated: Rather than studying alone, I'll study with friends at the library.
        audio_url: https://r2.kimchi-reader.app/grammar/혼자서_공부하느니_도서관에서_친구들과_같이_공부할게요__2024-05-27.mp3
  - slug: listing
    name: Listing
    english_alternatives: Or
    meaning: A connective ending used when listing words, thoughts, opinions, etc, that are usually opposite of one another.
    examples:
      - sentence: 화초 색상이 안 어울린다<f>느니</f>, 키가 안 맞는다<f>느니</f>, 나불나불 말만 하던 김 대리는 갑자기 집에 일이 생겼다며 먼저 돌아갔다.
        type: simple
        translated: Assistant manager Kim, who had been chattering away about how the flower colors didn't match or how the height wasn't right, suddenly claimed he had something come up at home and left early.
        audio_url: 
      - sentence: 그 두 사람 정말 결혼 할 수 있을까요? 결혼을 하<f>느니</f> 마<f>느니</f> 정말 말이 많던데요?
        type: simple
        translated: Can those two really get married? There's been so much talk about whether they should or shouldn't get married.
        audio_url: 
metadata:
  type: verb
details: |-
  # Usage {#usage}

  The words 차라리 or 아예 are often used in the following clause.
  When listing something,　<f>느니</f> is often used in conjunction with <f>ㄴ다</f>.
