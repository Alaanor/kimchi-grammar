point: (으)오이까/사오이까
definitions:
  - slug: humble-question
    name: Humble question
    meaning: Used to ask a question politely and respectfully in the 하소서체 speech level.
    examples:
      - type: simple
        sentence: 이 마을에 그런 사람이 <f>있겠사오이까</f>?
        translated: Surely there is no such person in this village?
        audio_url:
      - type: simple
        sentence: 선생께서는 진정 정당하게 <f>이겼소이까</f>?
        translated: Did you truly win fairly?
        audio_url:
      - type: simple
        sentence: 그것이 그리 <f>중요하오이까</f>?
        translated: Is that really so important?
        audio_url:
      - type: simple
        sentence: 선생은 누구를 <f>찾으오이까</f>?
        translated: Who are you looking for, sir?
        audio_url:
metadata:
  type: verb
details: |-
  # Usage {#usage}
  <f>사오이까</f> also has a shortform of 소이까.

  # What is 하소서체? {#what-is-하소서체?}

  <f>하소서체</f> is honorific speech used in archaic Korean; used to extremely respectfully address the listener. To modern
  Korean speakers this level of speech is perceived as an archaic style used only during the monarchical era.
  In modern Korean <f>하소서체</f> is functionally used only in literary expressions, and it is considered natural to use only
  when addressing a deity. You will encounter <f>하소서체</f> in period dramas, traditional literature, the bible, prayers
  to God, and similar.  :source[https://namu.wiki/w/하소서체]
