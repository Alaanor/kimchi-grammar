point: 아/야
definitions:
  - slug: informal-address
    name: Informal address
    meaning: A casual form of address used for things like juniors, friends, and animals.
    examples:
      - type: simple
        sentence: 야, 이 <f>멍청아</f>! 제대로 공부 안 해?
        translated: Hey, you idiot! Won't you study properly?
        audio_url:
      - type: simple
        sentence: <f>새야</f> <f>새야</f> <f>파랑새야</f>.
        translated: Bird, bird, bluebird.
        audio_url:
      - type: simple
        sentence: <f>철수야</f>, 어디 가니?
        translated: Cheolsu, where are you going?
        audio_url:
      - type: simple
        sentence: <f>얘들아</f>, 이리 와라!
        translated: Hey guys, come here!
        audio_url:
