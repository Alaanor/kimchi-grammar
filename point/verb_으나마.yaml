name: (으)나마
definitions:
  - slug: reluctant-acceptance
    name: Reluctant acceptance
    english_alternatives: at least, although, even though
    meaning: Expresses the speaker's reluctant acceptance of a situation as-is, even though it is not entirely satisfactory.
    examples:
      - type: simple
        sentence: <f>너나마</f> 와 주어서 다행이다.
        translated: I'm glad at least you came.
        audio_url: https://r2.kimchi-reader.app/grammar/너나마_와_주어서_다행이다__2026-05-15.mp3
      - type: simple
        sentence: 반찬 없는 <f>밥이나마</f> 많이 자시게.
        translated: Even though it's a meal without side dishes, please eat your fill.
        audio_url: https://r2.kimchi-reader.app/grammar/반찬_없는_밥이나마_많이_자시게__2026-05-15.mp3
      - type: simple
        sentence: <f>먼발치로나마</f> 보게 되어 기뻤다.
        translated: I was happy to see it, even if only from a distance.
        audio_url: https://r2.kimchi-reader.app/grammar/먼발치로나마_보게_되어_기뻤다__2026-05-15.mp3
      - type: simple
        sentence: 변변치는 <f>못하나마</f> 많이 잡수십시오.
        translated: It’s nothing special, but please help yourself.
        audio_url: https://r2.kimchi-reader.app/grammar/변변치는_못하나마_많이_잡수십시오__2026-05-15.mp3
      - type: simple
        sentence: <f>늦었으나마</f> 인사드립니다.
        translated: Although it's late, I'd like to extend my greetings.
        audio_url: https://r2.kimchi-reader.app/grammar/늦었으나마_인사드립니다__2026-05-15.mp3
metadata:
  type: verb
details: |-
  # Usage {#usage}

  The form <f>(이)나마</f> is used with nouns, and <f>(으)나마</f> is used with verbs.
