name: (스)ㅂ니다
definitions:
  - slug: present-tense
    name: Present tense
    english_alternatives:
    meaning: Used to explain the present action, state, or fact politely.
    examples:
      - sentence: 할아버지가 <f>칭찬하셨습니다</f>.
        type: simple
        translated: Grandfather praised me.
        audio_url: https://r2.kimchi-reader.app/grammar/할아버지가_칭찬하셨습니다__2024-04-13.mp3
      - sentence: 전 사람을 해친 적이 <f>없습니다</f>.
        type: simple
        translated: I have never harmed anyone.
        audio_url: https://r2.kimchi-reader.app/grammar/전_사람을_해친_적이_없습니다__2024-04-13.mp3
      - sentence: 저를 살려 주신 은혜를 꼭 갚고 <f>싶습니다</f>.
        type: simple
        translated: I want to repay the favor of saving me.
        audio_url: https://r2.kimchi-reader.app/grammar/저를_살려_주신_은혜를_꼭_갚고_싶습니다__2024-04-13.mp3
metadata:
  type: verb
details: |-
  # Alternative forms {#alt-forms}
  
  Before 1989, this grammar point was written as -읍니다 after final consonants ㅆ and ㅄ. For example:
  ::example[제가 하겠읍니다! | I will do it]
  ::example[선곡하신 곡이 없읍니다. | The song you've selected is unavailable]

  This usage of -읍니다 can still be seen in the writings of older people or to give a piece of text the vibe that a person who learned Korean spelling before 1989 is writing it.
  In modern usage, this form can sometimes be used humorously even after consonants that usually wouldn't take -읍니다. For example:
  ::example[그렇읍니다! | It is so!]
