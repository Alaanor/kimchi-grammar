name: (으)ㄹ세
definitions:
  - slug: 하게체-simple-statement
    name: 하게체 Simple statement
    meaning: Used to express the speaker's thoughts or conjecture in the 하게체 speech level.
    examples:
      - type: simple
        sentence: 내 가게 문 닫으면 그 자가 <f>춤출세</f>.
        translated: If my shop closes, that guy will be dancing for joy.
        audio_url: https://r2.kimchi-reader.app/grammar/내_가게_문_닫으면_그_자가_춤출세__2026-05-15.mp3
      - type: simple
        sentence: 이번 그림 참 <f>좋을세그려</f>.
        translated: This painting is really nice.
        audio_url: https://r2.kimchi-reader.app/grammar/이번_그림_참_좋을세그려__2026-05-15.mp3
      - type: simple
        sentence: “누구요?” “<f>날세</f>.”
        translated: '"Who is it?" "It''s me."'
        audio_url: https://r2.kimchi-reader.app/grammar/“누구요_”_“날세_”_2026-05-15.mp3
  - slug: 하게체-realization
    name: 하게체 Realization
    meaning: Express admiration after realizing something new, in the 하게체 speech level.
    examples:
      - type: simple
        sentence: 어머, 그게 바로 <f>오늘일세</f>.
        translated: Oh my, that’s today.
        audio_url: https://r2.kimchi-reader.app/grammar/어머,_그게_바로_오늘일세__2026-05-15.mp3
      - type: simple
        sentence: 그 생각 참 <f>좋을세</f>.
        translated: Wow, that’s a great idea.
        audio_url: https://r2.kimchi-reader.app/grammar/그_생각_참_좋을세__2026-05-15.mp3
  - slug: 하게체-intention
    name: 하게체 Intention
    meaning: Express intention in the 하게체 speech level.
    examples:
      - type: simple
        sentence: 그럼 이따가 <f>기별할세</f>. 잘 가게.
        translated: I'll let you know later then. Take care.
        audio_url: https://r2.kimchi-reader.app/grammar/그럼_이따가_기별할세_잘_가게__2026-05-15.mp3
      - type: simple
        sentence: 아버님이 오시면 함께 <f>먹을세</f>.
        translated: We'll eat together once father arrives.
        audio_url: https://r2.kimchi-reader.app/grammar/아버님이_오시면_함께_먹을세__2026-05-15.mp3
metadata:
  type: verb
details: |-
  # What is 하게체? {#what-is-하게체?}

  <f>하게체</f> is used to familiarly address someone without lowering oneself. It can be used to show respect when the other
  person is of lower social standing but not necessarily young in absolute age, but it is no longer common in the present day.

  You will still hear <f>하게체</f> used in daily conversation but due to its slightly archaic tone it will usually only
  be used by older people. A young person speaking using <f>하게체</f> will tend to sound quite awkward.

  Like 하오체, <f>하게체</f> is primarily used in historical dramas and other works set in the past. When used in modern times,
  it is often to portray a dignified character; like a king, a high-ranked noble, or a chill uncle.
  :source[https://namu.wiki/w/하게체]
