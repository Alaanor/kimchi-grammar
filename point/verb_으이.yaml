point: (으)이/의
definitions:
  - slug: 하게체-description
    name: 하게체 Description
    meaning: Used to express an impression or a simple description in the 하게체 speech level. Can be shortened from (으)이 to just 의.
    examples:
      - type: simple
        sentence: 그것 참 <f>좋의</f>.
        translated: That's really great.
        audio_url: https://r2.kimchi-reader.app/grammar/그것_참_좋의__2026-05-15.mp3
      - type: simple
        sentence: 요사이 날씨가 꽤 <f>차이</f>.
        translated: The weather is quite cold lately.
        audio_url: https://r2.kimchi-reader.app/grammar/요사이_날씨가_꽤_차이__2026-05-15.mp3
      - type: simple
        sentence: 자네 솜씨가 정말 <f>대단하이</f>.
        translated: Your skills are really amazing.
        audio_url: https://r2.kimchi-reader.app/grammar/자네_솜씨가_정말_대단하이__2026-05-15.mp3
      - type: simple
        sentence: 그런 짓은 이제 <f>싫으이</f>.
        translated: I'm done with that kind of thing.
        audio_url: https://r2.kimchi-reader.app/grammar/그런_짓은_이제_싫으이__2026-05-15.mp3
      - type: simple
        sentence: <f>용하이</f>, 정말 좋은 생각을 했네.
        translated: That's clever, you really had a great idea.
        audio_url: https://r2.kimchi-reader.app/grammar/용하이,_정말_좋은_생각을_했네__2026-05-15.mp3
metadata:
  type: verb
details: |-
  # What is 하게체? {#what-is-하게체?}

  <f>하게체</f> is used to familiarly address someone without lowering oneself. It can be used to show respect when the other
  person is of lower social standing but not necessarily young in absolute age, but it is no longer common in the present day.

  You will still hear <f>하게체</f> used in daily conversation but due to its slightly archaic tone it will usually only
  be used by older people. A young person speaking using <f>하게체</f> will tend to sound quite awkward.

  Like 하오체, <f>하게체</f> is primarily used in historical dramas and other works set in the past. When used in modern times,
  it is often to portray a dignified character; like a king, a high-ranked noble, or a chill uncle.
  :source[https://namu.wiki/w/하게체]
