name: 는고/(으)ㄴ고
definitions:
  - slug: soft-question
    name: Soft question
    english_alternatives:
    meaning: It can be used to ask a question in a polite and gentle way.
    examples:
      - type: simple
        sentence: 선물로 무엇이 좋은고?
        translated: What would be a good gift?
        audio_url:
      - type: simple
        sentence: 이게 누구 것인고?
        translated: Whose is this?
        audio_url:
      - type: simple
        sentence: 무엇을 바라는고?
        translated: What are you hoping for?
        audio_url:
  - slug: pondering
    name: Pondering
    english_alternatives: I wonder, Assuming
    meaning: Expresses the speaker's speculation, curiosity or assumption about something.
    examples:
      - type: simple
        sentence: 얼마나 훌륭한 일인고!
        translated: What a wonderful thing!
        audio_url:
      - type: simple
        sentence: 일이 해결이 되다니 이 얼마나 좋은고?
        translated: Isn't it wonderful that the problem has been solved?
        audio_url:
      - type: simple
        sentence: 내가 왜 그런 말을 했는고.
        translated: Why did I say that?
        audio_url:
      - type: simple
        sentence: 내가 무슨 잘못이 있는고.
        translated: What have I done wrong?
        audio_url:
metadata:
  type: verb
details: |-
  |Tense|Form|
  |---|---|
  |Present (descriptive verb)|<f>-(으)ㄴ고(요)</f>|
  |Present (action verb)|<f>는고(요)</f>|
  |Past (all)|<f>-(았/었)는고(요)</f>|
  |Future (all)|<f>-(으)ㄹ 건고(요)</f>|

  # Usage {#usage}

  This carries the same meanings as :grammar[verb_은가_ㄴ가_나], except it is generally used with question words like "who",
  "what", "when", "where", "why", or "how", and not used for yes-or-no questions.
