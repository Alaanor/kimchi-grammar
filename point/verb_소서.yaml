name: (으)소서
definitions:
  - slug: solemn-request
    name: Solemn request
    english_alternatives:
    meaning: Used to express a request or wish in an extremely polite fashion. Most often used when speaking to kings, queens, and God.
    examples:
      - type: simple
        sentence: 신이시여, 우리를 버리지 <f>마소서</f>!
        translated: O Lord, do not forsake us!
        audio_url: https://r2.kimchi-reader.app/grammar/신이시여,_우리를_버리지_마소서__2026-03-19.mp3
      - type: simple
        sentence: 주님을 믿사오며 나의 마음에 용기를 <f>채워주소서</f>.
        translated: As I trust in you Lord, please fill my heart with courage.
        audio_url: https://r2.kimchi-reader.app/grammar/주님을_믿사오며_나의_마음에_용기를_채워주소서__2026-03-19.mp3
      - type: simple
        sentence: 식단의 고통을 이겨내게 <f>하소서</f>.
        translated: Help me overcome the hardships of this diet.
        audio_url: https://r2.kimchi-reader.app/grammar/식단의_고통을_이겨내게_하소서__2026-03-19.mp3
      - type: simple
        sentence: 저의 말씀을 <f>들으소서</f>.
        translated: Listen to what I have to say.
        audio_url: https://r2.kimchi-reader.app/grammar/저의_말씀을_들으소서__2026-04-26.mp3
metadata:
  type: verb
